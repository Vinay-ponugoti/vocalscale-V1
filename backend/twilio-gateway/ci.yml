name: Twilio Gateway CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/twilio-gateway/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backend/twilio-gateway/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install dependencies
      working-directory: backend/twilio-gateway
      run: go mod download

    - name: Run Build
      working-directory: backend/twilio-gateway
      run: go build -v ./cmd/gateway/main.go

    - name: Run Tests
      working-directory: backend/twilio-gateway
      run: go test -v ./...
