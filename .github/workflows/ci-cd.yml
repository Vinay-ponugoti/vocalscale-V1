name: CI/CD Pipeline

on:
  push:
    branches: [ main, devagent ]
  pull_request:
    branches: [ main, devagent ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency only)'
        required: false
        default: 'false'
        type: boolean
      force_deploy:
        description: 'Force deployment'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  FRONTEND_DIR: 'frontend'

jobs:
  # ============================================================================
  # JOB 1: Code Quality & Security
  # ============================================================================
  quality-check:
    name: Quality & Security Checks
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        run: |
          cd ${{ env.FRONTEND_DIR }}
          npm ci

      - name: Check for sensitive files
        run: |
          if [ -f .env ] || [ -f ${{ env.FRONTEND_DIR }}/.env ]; then
            echo "❌ ERROR: .env file found in repository!"
            exit 1
          fi
          echo "✅ No sensitive files found"

      - name: TypeScript Check
        run: |
          cd ${{ env.FRONTEND_DIR }}
          npx tsc --noEmit
          echo "✅ TypeScript check passed"

      - name: ESLint Check
        run: |
          cd ${{ env.FRONTEND_DIR }}
          npm run lint 2>&1 || echo "⚠️ Lint warnings found (non-blocking)"
          echo "✅ ESLint check completed"

      - name: Security Audit
        run: |
          cd ${{ env.FRONTEND_DIR }}
          npm audit --audit-level=moderate --production || echo "⚠️ Security warnings found"
          echo "✅ Security audit completed"

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ============================================================================
  # JOB 2: Build & Test
  # ============================================================================
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    needs: quality-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        run: |
          cd ${{ env.FRONTEND_DIR }}
          npm ci

      - name: Run tests (if available)
        run: |
          cd ${{ env.FRONTEND_DIR }}
          if [ -f package.json ] && grep -q '"test"' package.json; then
            npm test -- --coverage
            echo "✅ Tests passed"
          else
            echo "⚠️ No test script found - skipping"
          fi
        continue-on-error: true

      - name: Build production bundle
        run: |
          cd ${{ env.FRONTEND_DIR }}
          npm run build
          echo "✅ Build successful"

      - name: Check bundle size
        run: |
          cd ${{ env.FRONTEND_DIR }}
          du -sh dist/
          echo "📊 Bundle size check completed"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ${{ env.FRONTEND_DIR }}/dist
          retention-days: 7

  # ============================================================================
  # JOB 3: Deployment to Vercel
  # ============================================================================
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ !inputs.skip_tests || inputs.force_deploy }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Preview)
        if: github.ref != 'refs/heads/main' && !inputs.force_deploy
        id: deploy-preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prebuilt'
          working-directory: ${{ env.FRONTEND_DIR }}
          alias-domains: |
            preview.vocalscale.com

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' || inputs.force_deploy
        id: deploy-prod
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --prebuilt'
          working-directory: ${{ env.FRONTEND_DIR }}

      - name: Comment PR with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy-preview.outputs.preview-url }}';
            const comment = `🚀 **Preview Deployment Ready**\n\n🔗 [View Preview](${deploymentUrl})\n\n✅ Build: ${{ github.sha }}\n📅 Deployed: ${new Date().toISOString()}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================================================
  # JOB 4: Monitoring & Alerts
  # ============================================================================
  monitoring:
    name: Deployment Monitoring
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: always()
    
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-vercel.result }}" == "success" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
            exit 1
          fi

      - name: Notify on failure
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            if (issue_number) {
              github.rest.issues.createComment({
                issue_number: issue_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '❌ **Deployment Failed**\n\nPlease check the [GitHub Actions logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
              });
            }
