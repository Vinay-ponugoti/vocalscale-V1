<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VocalScale Status</title>
    <meta name="description" content="Real-time status monitoring for VocalScale platform services." />
    <link rel="icon" href="https://www.vocalscale.com/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #1a202c;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .page-wrapper { max-width: 860px; margin: 0 auto; padding: 0 20px; }

        .header { display: flex; align-items: center; justify-content: space-between; padding: 40px 0 32px; }
        .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-wrap img { height: 44px; width: auto; }
        .logo-text { font-size: 28px; font-weight: 800; color: #1a202c; letter-spacing: -0.02em; }
        .subscribe-btn { background: #3b82f6; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; }
        .subscribe-btn:hover { background: #2563eb; }

        .incident-banner { border-radius: 6px; overflow: hidden; margin-bottom: 36px; display: none; }
        .incident-banner.active { display: block; }
        .incident-banner-header { padding: 14px 20px; font-size: 16px; font-weight: 700; color: #fff; }
        .incident-banner-header.warning { background: #e89a3c; }
        .incident-banner-header.critical { background: #e74c3c; }
        .incident-banner-body { background: #fff; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 6px 6px; padding: 20px; }
        .incident-update { margin-bottom: 20px; }
        .incident-update:last-child { margin-bottom: 0; }
        .incident-update-label { font-weight: 700; color: #1a202c; }
        .incident-update-text { color: #4a5568; font-size: 14px; line-height: 1.6; }
        .incident-update-time { font-size: 13px; color: #94a3b8; margin-top: 2px; }

        .uptime-intro { text-align: right; margin-bottom: 8px; font-size: 13px; color: #718096; }
        .uptime-intro a { color: #3b82f6; text-decoration: none; }
        .uptime-intro a:hover { text-decoration: underline; }

        .services-container { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 40px; }
        .service-row { padding: 20px 24px; border-bottom: 1px solid #edf2f7; }
        .service-row:last-child { border-bottom: none; }
        .service-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .service-name { font-size: 15px; font-weight: 700; color: #1a202c; }
        .service-name .info-icon { font-size: 12px; color: #a0aec0; margin-left: 6px; cursor: help; }
        .service-status-label { font-size: 14px; font-weight: 600; }
        .service-status-label.operational { color: #48bb78; }
        .service-status-label.degraded { color: #ecc94b; }
        .service-status-label.down { color: #f56565; }
        .service-status-label.checking { color: #a0aec0; }

        .uptime-bar-container { margin-bottom: 4px; }
        .uptime-bars { display: flex; gap: 1.5px; height: 34px; align-items: stretch; }
        .uptime-bar { flex: 1; border-radius: 2px; min-width: 0; cursor: pointer; transition: opacity 0.15s; position: relative; }
        .uptime-bar:hover { opacity: 0.75; }
        .uptime-bar.good { background: #48bb78; }
        .uptime-bar.degraded { background: #ecc94b; }
        .uptime-bar.down { background: #f56565; }
        .uptime-bar.no-data { background: #e2e8f0; }
        .uptime-bar-tooltip { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #1a202c; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 10; pointer-events: none; }
        .uptime-bar:hover .uptime-bar-tooltip { display: block; }
        .uptime-labels-row { display: flex; justify-content: space-between; align-items: center; position: relative; margin-top: 6px; }
        .uptime-label { font-size: 12px; color: #a0aec0; }
        .uptime-label-line { flex: 1; height: 1px; background: #e2e8f0; margin: 0 8px; }

        .past-incidents { margin-bottom: 60px; }
        .past-incidents-title { font-size: 24px; font-weight: 700; color: #2d3748; margin-bottom: 24px; }
        .incident-date-group { margin-bottom: 32px; }
        .incident-date { font-size: 16px; font-weight: 700; color: #1a202c; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; margin-bottom: 12px; }
        .incident-none { font-size: 14px; color: #a0aec0; }
        .incident-entry-title { font-size: 15px; font-weight: 700; color: #1a202c; margin-bottom: 8px; }
        .incident-entry-update { margin-bottom: 16px; }
        .incident-entry-update p { font-size: 14px; color: #4a5568; line-height: 1.6; }
        .incident-entry-update .incident-entry-time { font-size: 13px; color: #94a3b8; margin-top: 2px; }

        .footer { text-align: center; padding: 24px 0 32px; border-top: 1px solid #e2e8f0; margin-top: auto; }
        .footer p { font-size: 12px; color: #a0aec0; }
        .footer a { color: #3b82f6; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .uptime-bars { height: 28px; }
            .service-row { padding: 16px; }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="header">
            <a href="https://www.vocalscale.com" class="logo-wrap">
                <img src="https://www.vocalscale.com/logo.png" alt="VocalScale" onerror="this.style.display='none'" />
                <span class="logo-text">VocalScale</span>
            </a>
            <a href="mailto:support@vocalscale.com" class="subscribe-btn">Subscribe to Updates</a>
        </div>

        <div class="incident-banner" id="incidentBanner">
            <div class="incident-banner-header warning" id="bannerHeader">Service Disruption</div>
            <div class="incident-banner-body" id="bannerBody"></div>
        </div>

        <p class="uptime-intro">Uptime over the past 90 days. <a href="#">View historical uptime.</a></p>

        <div class="services-container" id="servicesContainer">
            <div class="service-row">
                <div class="service-header">
                    <span class="service-name">Loading status...</span>
                </div>
            </div>
        </div>

        <div class="past-incidents">
            <h2 class="past-incidents-title">Past Incidents</h2>
            <div id="pastIncidents"></div>
        </div>
    </div>

    <div class="footer">
        <div class="page-wrapper">
            <p>&copy; 2026 <a href="https://www.vocalscale.com">VocalScale</a> &bull; AI Voice Platform &bull; Data updated by Status Tracker Agent</p>
        </div>
    </div>

    <script>
        const STATUS_URL = '/data/status.json';
        const INCIDENTS_URL = '/data/incidents.json';
        const REFRESH_INTERVAL = 60000;

        const serviceKeyMap = {
            'API Gateway': 'api',
            'Authentication': 'auth',
            'Payment Service': 'payment',
            'Knowledge Engine': 'knowledge',
            'Website': 'website'
        };

        let uptimeData, statusData, incidentsData;

        function generate90DayData() {
            const data = {};
            const now = new Date();
            Object.values(serviceKeyMap).forEach(key => {
                const days = [];
                for (let i = 89; i >= 0; i--) {
                    const d = new Date(now);
                    d.setDate(d.getDate() - i);
                    days.push({
                        date: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                        status: 'good'
                    });
                }
                data[key] = days;
            });
            return data;
        }

        function formatTime(iso) {
            return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatMs(ms) { return ms.toFixed(0) + 'ms'; }

        function getStatusLabel(status) {
            const map = { 'operational': 'Operational', 'degraded': 'Degraded Performance', 'down': 'Major Outage', 'unknown': 'Unknown' };
            return map[status] || 'Unknown';
        }

        async function loadStatus() {
            try {
                const [statusRes, incidentsRes] = await Promise.all([
                    fetch(STATUS_URL),
                    fetch(INCIDENTS_URL).catch(() => ({ json: () => Promise.resolve([]) }))
                ]);
                if (!statusRes.ok) throw new Error(`HTTP ${statusRes.status}`);
                statusData = await statusRes.json();
                incidentsData = await incidentsRes.json();
                render();
                updateBanner();
                renderPastIncidents();
            } catch (err) {
                console.error(err);
                renderError();
            }
        }

        function render() {
            const container = document.getElementById('servicesContainer');
            if (!statusData?.services) {
                container.innerHTML = '<div class="service-row"><div class="service-header"><span class="service-name">Loading status...</span></div></div>';
                return;
            }
            container.innerHTML = statusData.services.map(service => {
                const key = serviceKeyMap[service.name];
                const days = uptimeData[key] || [];
                if (days.length > 0 && service.status !== 'unknown') {
                    days[days.length - 1].status = service.status === 'operational' ? 'good' : service.status === 'degraded' ? 'degraded' : 'down';
                }
                const goodDays = days.filter(d => d.status === 'good').length;
                const uptimePercent = days.length > 0 ? ((goodDays / days.length) * 100).toFixed(2) : '100.00';
                const barsHtml = days.map(d => `<div class="uptime-bar ${d.status}" title="${d.date}"></div>`).join('');
                return `
                    <div class="service-row">
                        <div class="service-header">
                            <span class="service-name">${service.name} <span class="info-icon" title="Response: ${formatMs(service.response_time)}">?</span></span>
                            <span class="service-status-label ${service.status}">${getStatusLabel(service.status)}</span>
                        </div>
                        <div class="uptime-bar-container">
                            <div class="uptime-bars">${barsHtml}</div>
                            <div class="uptime-labels-row">
                                <span class="uptime-label">90 days ago</span>
                                <span class="uptime-label-line"></span>
                                <span class="uptime-label">${uptimePercent}% uptime</span>
                                <span class="uptime-label-line"></span>
                                <span class="uptime-label">Today</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateBanner() {
            const banner = document.getElementById('incidentBanner');
            const activeIncidents = statusData?.active_incidents || [];
            if (!activeIncidents.length) { banner.classList.remove('active'); return; }
            banner.classList.add('active');
            const downIncidents = activeIncidents.filter(i => i.type === 'outage');
            const degradedIncidents = activeIncidents.filter(i => i.type === 'performance');
            const header = document.getElementById('bannerHeader');
            const body = document.getElementById('bannerBody');
            if (downIncidents.length) {
                header.className = 'incident-banner-header critical';
                header.textContent = `Service Disruption — ${downIncidents.map(i => i.service).join(', ')}`;
                body.innerHTML = downIncidents.map(inc => `
                    <div class="incident-update">
                        <p class="incident-update-text"><span class="incident-update-label">Investigating</span> - ${inc.message}</p>
                        <p class="incident-update-time">${formatTime(inc.started_at)}</p>
                    </div>
                `).join('');
            } else if (degradedIncidents.length) {
                header.className = 'incident-banner-header warning';
                header.textContent = `Degraded Performance — ${degradedIncidents.map(i => i.service).join(', ')}`;
                body.innerHTML = degradedIncidents.map(inc => `
                    <div class="incident-update">
                        <p class="incident-update-text"><span class="incident-update-label">Monitoring</span> - ${inc.message}</p>
                        <p class="incident-update-time">${formatTime(inc.started_at)}</p>
                    </div>
                `).join('');
            }
        }

        function renderPastIncidents() {
            const container = document.getElementById('pastIncidents');
            const incidents = incidentsData || [];
            const allIncidents = [...incidents].sort((a, b) => new Date(b.started_at) - new Date(a.started_at));
            const grouped = {};
            allIncidents.forEach(inc => {
                const date = new Date(inc.started_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(inc);
            });
            if (!Object.keys(grouped).length) {
                let html = '';
                const now = new Date();
                for (let i = 0; i < 7; i++) {
                    const d = new Date(now);
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    html += `<div class="incident-date-group"><div class="incident-date">${dateStr}</div><p class="incident-none">No incidents reported.</p></div>`;
                }
                container.innerHTML = html;
                return;
            }
            container.innerHTML = Object.entries(grouped).map(([date, incs]) => `
                <div class="incident-date-group">
                    <div class="incident-date">${date}</div>
                    ${incs.map(inc => `
                        <div class="incident-entry-title">${inc.service} - ${inc.type}</div>
                        <div class="incident-entry-update">
                            <p>${inc.message}</p>
                            <p class="incident-entry-time">${formatTime(inc.started_at)}${inc.ended_at ? ` → ${formatTime(inc.ended_at)}` : ''}</p>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function renderError() {
            document.getElementById('servicesContainer').innerHTML = `
                <div class="service-row"><div class="service-header"><span class="service-name">Unable to load status data</span></div></div>
                <p style="padding: 0 24px 20px; color: #718096; font-size: 14px;">The Status Tracker Agent may be starting up. Please check back in a moment.</p>
            `;
            document.getElementById('pastIncidents').innerHTML = `<p class="incident-none">Unable to load incidents.</p>`;
        }

        uptimeData = generate90DayData();
        loadStatus();
        setInterval(loadStatus, REFRESH_INTERVAL);
    </script>
</body>

</html>
