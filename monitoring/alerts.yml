groups:
  - name: voice-ai-critical-alerts
    interval: 30s
    rules:
      - alert: VoiceAIGatewayDown
        expr: up{job="go-service"} == 0
        for: 2m
        labels:
          severity: critical
          service: go-service
          team: infrastructure
        annotations:
          summary: "🚨 Voice AI Gateway is DOWN"
          description: "Voice AI Gateway service has been down for more than 2 minutes"
          runbook_url: "https://wiki.company.com/runbooks/voice-ai-gateway-down"
          dashboard_url: "http://localhost:3000/d/go-service-voice-ai-gateway"

      - alert: VoiceAIAPIHighErrorRate
        expr: rate(http_requests_total{job="go-service",status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          service: go-service
          team: infrastructure
        annotations:
          summary: "🔥 Voice AI Gateway High Error Rate"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.method }} {{ $labels.path }}"
          runbook_url: "https://wiki.company.com/runbooks/voice-ai-high-errors"

      - alert: VoiceAIAPILatencyHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="go-service"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: go-service
          team: infrastructure
        annotations:
          summary: "⏱️ Voice AI Gateway High Latency"
          description: "95th percentile latency is {{ $value }}s for {{ $labels.method }} {{ $labels.path }}"

      - alert: VoiceAIActiveCallsSpike
        expr: active_calls_count > 100
        for: 5m
        labels:
          severity: warning
          service: go-service
          team: infrastructure
        annotations:
          summary: "📞 Unusual Voice Call Volume"
          description: "Active calls count is {{ $value }}, which is above normal threshold"

      - alert: VoiceAILLMProcessingSlow
        expr: histogram_quantile(0.95, rate(llm_processing_time_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: go-service
          team: ai-team
        annotations:
          summary: "🤖 LLM Processing Very Slow"
          description: "LLM 95th percentile processing time is {{ $value }}s"

  - name: voice-ai-python-alerts
    interval: 30s
    rules:
      - alert: VoiceAIPythonAPIDown
        expr: up{job="python-service"} == 0
        for: 2m
        labels:
          severity: critical
          service: python-service
          team: backend
        annotations:
          summary: "🚨 Voice AI Python API is DOWN"
          description: "Python API service has been down for more than 2 minutes"
          dashboard_url: "http://localhost:3000/d/python-service-voice-ai-api"

      - alert: VoiceAIPythonAPIHighLatency
        expr: histogram_quantile(0.95, rate(fastapi_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: python-service
          team: backend
        annotations:
          summary: "⏱️ Python API High Latency"
          description: "API 95th percentile latency is {{ $value }}s"

      - alert: VoiceAITTSProcessingSlow
        expr: histogram_quantile(0.95, rate(tts_processing_time_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          service: python-service
          team: ai-team
        annotations:
          summary: "🎙️ TTS Processing Very Slow"
          description: "TTS 95th percentile processing time is {{ $value }}s"

      - alert: VoiceAICacheHitRateLow
        expr: (rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m]))) < 0.8
        for: 10m
        labels:
          severity: warning
          service: python-service
          team: backend
        annotations:
          summary: "💾 Cache Hit Rate Low"
          description: "Cache hit rate is {{ $value | humanizePercentage }}, which is below 80%"

      - alert: VoiceAIQueueBacklog
        expr: notification_queue_length > 1000
        for: 10m
        labels:
          severity: warning
          service: python-service
          team: backend
        annotations:
          summary: "📋 Notification Queue Backlog"
          description: "Queue length is {{ $value }} messages"

  - name: voice-ai-frontend-alerts
    interval: 30s
    rules:
      - alert: VoiceAIFrontendDown
        expr: up{job="frontend"} == 0
        for: 2m
        labels:
          severity: critical
          service: frontend
          team: frontend
        annotations:
          summary: "🚨 Voice AI Frontend is DOWN"
          description: "Frontend service has been down for more than 2 minutes"
          dashboard_url: "http://localhost:3000/d/frontend-voice-ai-dashboard"

      - alert: VoiceAIFrontendHighErrorRate
        expr: rate(frontend_js_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: frontend
          team: frontend
        annotations:
          summary: "🔥 Frontend High JavaScript Error Rate"
          description: "JavaScript error rate is {{ $value | humanizePercentage }}"

      - alert: VoiceAIFrontendPageLoadSlow
        expr: histogram_quantile(0.75, rate(frontend_page_load_duration_seconds_bucket[5m])) > 4
        for: 5m
        labels:
          severity: warning
          service: frontend
          team: frontend
        annotations:
          summary": "🐌 Frontend Page Load Very Slow"
          description: "75th percentile page load time is {{ $value }}s"

      - alert: VoiceAIFrontendWebSocketDisconnected
        expr: frontend_websocket_connected == 0
        for: 2m
        labels:
          severity: warning
          service: frontend
          team: frontend
        annotations:
          summary: "🔌 Frontend WebSocket Disconnected"
          description: "WebSocket connection is down"

      - alert: VoiceAIFrontendHighReconnections
        expr: rate(frontend_websocket_reconnects_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          service: frontend
          team: frontend
        annotations:
          summary: "🔄 Frontend WebSocket High Reconnection Rate"
          description: "WebSocket reconnection rate is {{ $value }}/sec"