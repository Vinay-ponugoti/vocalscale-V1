server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log

  - job_name: docker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - labels:
          stream:
      - output:
          source: output

  - job_name: api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: api
          service: voice-ai-api
          __path__: /app/logs/*.log

  - job_name: payment-service-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: payment-service
          service: voice-ai-payment
          __path__: /app/logs/*.log

  - job_name: twilio-gateway-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: twilio-gateway
          service: voice-ai-twilio
          __path__: /app/logs/*.log